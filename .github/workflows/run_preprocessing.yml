name: Run Student Dropout Preprocessing

on:
  push:
    branches:
      - main
    paths:
      - 'student_dropout_raw.csv'
      - 'preprocessing/automate_Ghazi-Taqiyya-Al-Anshari.py'

jobs:
  preprocess:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install pipenv
        run: |
          python -m pip install --upgrade pip
          pip install pipenv

      - name: Install dependencies
        run: pipenv install --deploy

      - name: Run preprocessing script
        run: pipenv run python preprocessing/automate_Ghazi-Taqiyya-Al-Anshari.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add preprocessing/student_dropout_preprocessing.csv
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(preprocessing): update student dropout preprocessed data"
            git push
          fi
